name: Feature request
description: Suggest a ClaySoldiers improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Feature requests should stay within the Clay Soldiers plugin scope.
  - type: textarea
    id: purpose
    attributes:
      label: Gameplay purpose
      description: What Clay Soldiers gameplay problem or opportunity does this address?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
      description: Describe the intended behavior, commands, config, recipes, roles, modifiers, or AI changes.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What simpler or different approaches could solve the same problem?
    validations:
      required: false
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility concerns
      description: Note any Paper API, Java, config migration, performance, or gameplay balance concerns.
    validations:
      required: false
