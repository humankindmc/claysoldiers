name: ClaySoldiers
version: ${version}
main: com.claysoldiers.ClaySoldiersPlugin
api-version: '1.21'
description: A Clay Soldiers battle plugin for Paper.
author: Lane
commands:
  claysoldiers:
    description: Manage Clay Soldiers.
    usage: /claysoldiers <give|spawn|clear|teams|roles|count>
    aliases:
      - csoldiers
permissions:
  claysoldiers.claysoldiers:
    description: Allows use of Clay Soldiers admin commands.
    default: op
